<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFK Bot - Server Settings</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
:root{
    --primary:#3b82f6;
    --primary-hover:#2563eb;
    --background:#0f172a;
    --surface:#1e293b;
    --text:#f1f5f9;
    --text-secondary:#94a3b8;
    --border:#334155;
    --success:#22c55e;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Segoe UI,sans-serif;
    background:var(--background);
    color:var(--text);
}
header{
    background:linear-gradient(135deg,var(--primary),var(--primary-hover));
    padding:1rem;
    box-shadow:0 4px 10px rgba(0,0,0,.3);
}
.header-content{
    max-width:1000px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.container{
    max-width:700px;
    margin:40px auto;
    padding:20px;
}
.card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:25px;
}
.card h2{
    margin-bottom:20px;
}
.form-group{
    margin-bottom:20px;
}
label{
    display:block;
    margin-bottom:8px;
    color:var(--text-secondary);
}
input{
    width:100%;
    padding:12px;
    border:1px solid var(--border);
    background:var(--background);
    color:white;
    border-radius:8px;
    font-size:15px;
}
button{
    background:var(--primary);
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}
button:hover{
    background:var(--primary-hover);
}
.nav-btn{
    color:white;
    text-decoration:none;
    padding:10px 15px;
    border:1px solid rgba(255,255,255,.2);
    border-radius:8px;
}
#status{
    margin-top:15px;
  color:var(--success);
}
</style>
</head>
<body>
<header>
<div class="header-content">
<h1><i class="fas fa-server"></i> Server Settings</h1>
<div>
<a href="/" class="nav-btn">
<i class="fas fa-arrow-left"></i> Dashboard
</a>
</div>
</div>
</header>
<div class="container">
<div class="card">
<h2><i class="fas fa-network-wired"></i> Configure Server</h2>
<form id="serverForm">
<div class="form-group">
<label>Server IP</label>
<input type="text" id="serverIP" placeholder="192.168.1.102" required>
</div>
<div class="form-group">
<label>Server Port</label>
<input type="number" id="serverPort" placeholder="3000" required>
</div>
<button type="submit">
<i class="fas fa-save"></i> Save Settings
</button>
</form>
<p id="status"></p>
</div>
</div>
<script>
function loadSettings(){
fetch('/storage')
.then(res=>res.json())
.then(data=>{
document.getElementById('serverIP').value=data.serverIP||"";
document.getElementById('serverPort').value=data.serverPort||"";
})
.catch(console.error);
}
document.getElementById('serverForm').addEventListener('submit',function(e){
e.preventDefault();
const settings={
serverIP:document.getElementById('serverIP').value,
serverPort:document.getElementById('serverPort').value
};
fetch('/storage',{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify(settings)
})
.then(res=>res.json())
.then(()=>{
document.getElementById('status').textContent="✔ Settings saved successfully.";
})
.catch(err=>{
document.getElementById('status').textContent="❌ Failed to save settings.";
console.error(err);
});
});
loadSettings();
</script>
</body>
</html>
